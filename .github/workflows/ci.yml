# CI pipeline for myproject.
#
# Runs on every push and pull request to main/master branches.
#
# Quality gates:
#   Backend  — uv sync → uv sync --frozen → make check-all-backend
#   Frontend — pnpm install → make build-frontend → make type-check-frontend test-frontend

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Python / Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Validate lockfile
        run: uv sync --frozen

      - name: Lint, type-check, test
        run: make check-all-backend

  # ─────────────────────────────────────────────────────────────
  # Frontend / TypeScript
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: myproject-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: myproject-frontend

      - name: Build for production
        run: make build-frontend

      - name: Type-check and test
        run: make type-check-frontend test-frontend
